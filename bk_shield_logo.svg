<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 370" width="300" height="370">
  <defs>
    <linearGradient id="shieldGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2E6FD9"/>
      <stop offset="100%" stop-color="#0B1D3E"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="dropshadow" x="-25%" y="-15%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M28,28 L272,28 L272,170 Q266,255 150,293 Q34,255 28,170 Z"
        fill="url(#shieldGrad)" filter="url(#dropshadow)"/>

  <!-- Inner highlight overlay -->
  <path d="M28,28 L272,28 L272,120 Q200,80 150,85 Q100,80 28,120 Z"
        fill="url(#glowGrad)"/>

  <!-- Inner border -->
  <path d="M44,44 L256,44 L256,170 Q251,240 150,276 Q49,240 44,170 Z"
        fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="1.5"/>

  <!-- Horizontal divider -->
  <line x1="64" y1="115" x2="236" y2="115"
        stroke="rgba(255,255,255,0.30)" stroke-width="1.5"/>

  <!-- Lock icon: outer ring -->
  <circle cx="150" cy="76" r="22"
          fill="rgba(255,255,255,0.10)"
          stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>

  <!-- Lock icon: inner dot -->
  <circle cx="150" cy="76" r="8"
          fill="rgba(255,255,255,0.65)"/>

  <!-- Lock body (bottom of keyhole) -->
  <rect x="143" y="82" width="14" height="10" rx="3"
        fill="rgba(255,255,255,0.65)"/>

  <!-- BK text -->
  <text x="150" y="228"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="92"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        letter-spacing="6">BK</text>

  <!-- Wordmark: SHIELD -->
  <text x="150" y="352"
        font-family="Arial, Helvetica, sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="14"
        fill="#0F2D5E"
        text-anchor="middle">SHIELD</text>
</svg>
